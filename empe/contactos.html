<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto</title>
    <link rel="stylesheet" href="css/contacto.css">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<section class="contacto">

    <h1>Contacto</h1>
    <p>Completa el formulario y te responderé lo más pronto posible</p>

    <form class="formulario" onsubmit="return validarFormulario()">

        <div class="campo">
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
        </div>

        <div class="campo">
            <label>Teléfono</label>
            <input type="tel" id="telefono" placeholder="Tu teléfono">
        </div>

        <div class="campo">
            <label>Correo</label>
            <input type="email" id="correo" placeholder="Tu correo">
        </div>

        <div class="campo">
            <label>Mensaje</label>
            <textarea id="mensaje" placeholder="Escribe tu mensaje"></textarea>
        </div>

        <input class="boton-enviar" type="submit" value="Enviar">

    </form>

    <!-- BOTÓN WHATSAPP -->
    <a href="#" class="whatsapp" onclick="enviarWhatsApp()">
        <i class="fab fa-whatsapp"></i> Contactar por WhatsApp
    </a>

    <!-- INFO EXTRA -->
    <div class="info-extra">
        <h2>¿Por qué contactarme?</h2>

        <div class="beneficios">
            <div class="beneficio">
                <p>"Respuesta rápida y atención personalizada."</p>
            </div>

            <div class="beneficio">
                <p>"Trabajo profesional y garantizado."</p>
            </div>

            <div class="beneficio">
                <p>"Más de 10 clientes satisfechos."</p>
            </div>
        </div>
    </div>

</section>

<script>
function validarFormulario() {
    let nombre = document.getElementById("nombre").value;
    let correo = document.getElementById("correo").value;
    let mensaje = document.getElementById("mensaje").value;

    if (nombre === "" || correo === "" || mensaje === "") {
        alert("Por favor completa los campos obligatorios");
        return false;
    }

    alert("Mensaje enviado correctamente ✅");
    return true;
}

function enviarWhatsApp() {
    let nombre = document.getElementById("nombre").value;
    let mensaje = document.getElementById("mensaje").value;

    let numero = "972078682"; // 🔴 CAMBIA POR TU NUMERO

    let texto = "Hola, soy " + nombre + ". " + mensaje;

    let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(texto);

    window.open(url, "_blank");
}
</script>

</body>
</html>
